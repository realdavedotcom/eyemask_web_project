<!DOCTYPE html>
<html><body>
<h2>Students</h2>
<a href="/add">Add Student</a>
<table border="1">
<tr><th>Name</th><th>Email</th><th>Matric</th><th>Department</th><th>Faculty</th><th>Action</th></tr>
{% for s in students %}
<tr>
<td>{{ s[1] }}</td><td>{{ s[2] }}</td><td>{{ s[3] }}</td>
<td>{{ s[4] }}</td><td>{{ s[5] }}</td>
<td><a href="/edit/{{ s[0] }}">Edit</a> | <a href="/delete/{{ s[0] }}">Delete</a></td>
</tr>
{% endfor %}
</table>
</body></html>
